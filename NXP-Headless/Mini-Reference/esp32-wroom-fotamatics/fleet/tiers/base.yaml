  ECO_MODE:          false
  LANE_KEEP:         false
  SPORT_MODE:        false
  PREDICTIVE_BRAKE:  false

compile_flags:
  - FEATURE_REMOTE_DIAG
  - FEATURE_OTA

package_suffix: base
